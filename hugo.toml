baseURL = "https://example.org"
languageCode = "fa-ir"
title = "سیستم عامل به سبک ترد"

# ===========================================
# تنظیمات کلی سایت
# ===========================================

[params]
description = "یادگیری شبکه با تردهای کوتاه"
threads_preview_count = 3

# ===========================================
# تنظیمات دارک مود
# enabled = true: دکمه تغییر تم نمایش داده میشه
# enabled = false: دکمه تغییر تم مخفیه (حالت پیش‌فرض)
# ===========================================
[params.dark_mode]
enabled = false

# ===========================================
# متن لایسنس پیش‌فرض مطالب
# این متن توی صفحه تکی هر ترد نمایش داده میشه
# کاراکتر {license} با مقدار license از frontmatter جایگزین میشه
# ===========================================
[params.license]
text = " مگه میشه مطلبی بدون لایسنس آخه؟ لایسنس این مطلب : {license}"

# ===========================================
# محتوای صفحه اصلی (بَنِر)
# این بخش مربوط به اولین صفحه‌ای هست که کاربر می‌بینه
# ===========================================

[params.banner]
# عنوان اصلی بنر (روی عکس نمایش داده میشه)

title = "یادگیری شبکه با تِرِد"

# آدرس عکس بنر
image = "/assets/static-pic/thread.png"

# عنوان بخش "تِرِد چیست؟"
section_title = "تِرِد چیست؟"
# توضیحات کوتاه درباره ترد
description = "تِرِد در معنای «پست کوتاه» معمولاً به یک نوشته‌ی مختصر و فشرده در شبکه‌های اجتماعی گفته می‌شود؛ جایی که کاربر در چند خط، یک ایده، خبر، نظر یا نکته را بیان می‌کند. این نوع پست‌ها معمولاً سریع خوانده می‌شوند، ریتم تند دارند و برای جلب توجه در میان انبوه محتوا طراحی شده‌اند. تِرِدها به دلیل کوتاهی، اغلب لحنی خودمانی‌تر و مستقیم‌تر دارند و بیشتر برای بیان یک ایده، یک واکنش لحظه‌ای، یا انتقال سریع اطلاعات استفاده می‌شوند."
# متن دکمه CTA در بنر
cta_text = "شروع یادگیری رایگان"

# ===========================================
# اطلاعات نویسنده اصلی سایت
# همه این مقادیر توی تمپلیت‌ها خوانده میشن و دیگه هاردکد نیستن
# ===========================================

[params.author]
# اسم نویسنده (فارسی یا انگلیسی)
name = "فرهان"
# بیوگرافی کوتاه نویسنده که زیر اسمش نمایش داده میشه
bio = "دانشجوی علوم کامپیوتر و علاقمند به برنامه‌نویسی سطح پایین، در حال حاضر روی پروژه وبها کار می‌کنم"
# آدرس عکس پروفایل نویسنده 
avatar = "/assets/static-pic/avatar.png"
# لینک صفحه دونیت یا حمایت مالی
donate_url = "#"

# ===========================================
# لینک‌های شبکه‌های اجتماعی نویسنده (اختیاری)
# این لینک‌ها در پروفایل نویسنده نمایش داده میشن
# ===========================================

[params.author.social]
# لیست لینک‌های شبکه‌های اجتماعی
# هر آیتم شامل name و url هست
# مثال: {name = "github", url = "https://github.com/user"}

social_links = [
  {name = "گیت هابم", url = "https://github.com/user"},
  {name = "تلگرام", url = "https://github.com/user"},
]

# ===========================================
# متن‌های مدال (پنجره‌های بازشونده)
# این متن‌ها وقتی کاربر روی آیکون‌ها کلیک میکنه نمایش داده میشن
# ===========================================

[params.modal]
# متن عنوان مدال وقتی هنوز تردی منتشر نشده
empty_title = "هنوز هیچ تردی منتشر نشده!"
# متن توضیحات مدال وقتی هنوز تردی منتشر نشده
empty_text = "از یکشنبه اولین تردها رو شروع میکنم. پس فعلاً فقط آماده باش :)"
# متن دکمه کپی لینک در مدال اشتراک‌گذاری
copy_link_text = "کپی لینک"
# متن بعد از کپی شدن لینک
copied_text = "کپی شد"

# ===========================================
# متن‌های مرتبط با ترد (پست‌ها)
# این متن‌ها توی صفحه تکی ترد و لیست تردها استفاده میشن
# ===========================================

[params.thread]
# متنی که بعد از خوندن یک ترد نمایش داده میشه
read_message = "شما این تِرِد رو مطالعه کردید آفرین.🍻"
# متن دکمه "خواندی؟ کلیک کن"
mark_read_text = "خوندی؟ کلیک کن"
# متن دکمه بعد از کلیک (یعنی ترد خوانده شده)
marked_read_text = "خونده نشده"
# متن عنوان مدال تبریک بعد از خوندن ترد
congrats_title = "تبریک عرض مینمایم"
# متن مدال تبریک (کاراکتر {count} با تعداد تردهای خوانده شده جایگزین میشه)
congrats_text = "تا الان {count} ترد خوندی بنازمتتتت"
# متن اشتراک‌گذاری (کاراکتر {title} با عنوان ترد جایگزین میشه)
share_text = "سلام دوستان! ترد '{title}' رو بخونید، خیلی مفیده"
# تعداد ترد در هر صفحه لیست (صفحه‌بندی)
threads_per_page = 5
# آدرس عکس تبریک (بعد از خوندن ترد)
congrats_image = "/assets/static-pic/dancing-img.gif"

# ===========================================
# دست نزن به این بخش برادر من خب...
# ===========================================

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

# ===========================================
# تنظیمات گیت‌هاب
# برای لینک‌های "ویرایش در گیت‌هاب" و "مشاهده منبع" استفاده میشه
# ===========================================

[params.github]
# آدرس مخزن (repo) در گیت‌هاب - فرمت: username/repo-name
repo = "farhantbyte/ntbftb-site"
# نام شاخه (branch) اصلی
branch = "main"

# ===========================================
# تنظیمات Giscus (سیستم نظرات)
# برای فعال‌سازی، اول باید Giscus رو در گیت‌هاب فعال کنید
# https://giscus.app
# ===========================================

[params.giscus]
# آدرس مخزن گیت‌هاب (همون repo هست)
repo = "farhantbyte/ntbftb-site"
# شناسه مخزن (از giscus.app دریافت میشه)
repoId = ""
# مسیر ناوبری (خالی بذارید تا از pathname استفاده کنه)
category = ""
# شناسه دسته‌بندی
categoryId = ""
# تم روشن
lightTheme = "light"
# تم تاریک
darkTheme = "dark"